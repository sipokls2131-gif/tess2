<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CCTV LOGIN</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      overflow:hidden;
    }

    .login-box{
      width:350px;
      padding:40px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:20px;
      box-shadow:0 0 30px rgba(0,224,255,0.2);
      color:white;
    }

    .login-box h1{
      text-align:center;
      margin-bottom:30px;
      color:#00e0ff;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      outline:none;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#00e0ff;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      transform:scale(1.03);
    }

    .error{
      margin-top:15px;
      color:#ef4444;
      text-align:center;
      display:none;
    }

  </style>
</head>
<body>

  <div class="login-box">

    <h1>CCTV SECURITY</h1>

    <div class="input-box">
      <label>Username</label>
      <input type="text" id="username">
    </div>

    <div class="input-box">
      <label>Password</label>
      <input type="password" id="password">
    </div>

    <button class="login-btn" onclick="login()">
      LOGIN
    </button>

    <div class="error" id="error">
      Username atau Password salah!
    </div>

  </div>

  <script>

    const USERNAME = "admin";
    const PASSWORD = "12345";

    function login(){

      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;

      if(user === USERNAME && pass === PASSWORD){

        alert("Login Berhasil!");

        window.location.href = "dashboard.html";

      }else{

        document.getElementById("error").style.display = "block";

      }

    }

  </script>

</body>
<!-- </html> -->
